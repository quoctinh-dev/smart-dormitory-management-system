<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông báo từ SDMS</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .header { background-color: #2563eb; color: #fff; padding: 15px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { padding: 20px; }
        .footer { font-size: 12px; color: #777; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Ký Túc Xá Thông Minh (SDMS)</h2>
        </div>
        <div class="content">
            <p>Xin chào <strong th:text="${studentName}">Sinh viên</strong>,</p>
            <p th:text="${message}">Nội dung thông báo</p>
        </div>
        <div class="footer">
            <p>Đây là email tự động. Vui lòng không trả lời thư này.</p>
        </div>
    </div>
</body>
</html>
