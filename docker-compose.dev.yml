services:
  backend:
    image: maven:3.9.9-eclipse-temurin-17
    working_dir: /workspace
    command: mvn spring-boot:run
    volumes:
      - ./sdms-backend:/workspace
      - sdms-maven-cache:/root/.m2
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sdms_db}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:5173}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      SERVER_PORT: 8080
      SDMS_MQTT_URL: tcp://mosquitto:1883

  frontend:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./sdms-frontend:/workspace
      - sdms-frontend-node-modules:/workspace/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"

  mosquitto:
    image: eclipse-mosquitto:2.0.15
    container_name: sdms-mosquitto-dev
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - sdms-mosquitto-data:/mosquitto/data
      - sdms-mosquitto-log:/mosquitto/log

volumes:
  sdms-maven-cache:
  sdms-frontend-node-modules:
  sdms-mosquitto-data:
  sdms-mosquitto-log:
